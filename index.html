<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImgUL - Image Hosting</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#A855F7",
                        secondary: "#06B6D4",
                        surface: "#171717",
                        backgroundDark: "#0a0a0a"
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                        body: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3 {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-nav {
            background: rgba(10, 10, 10, .7);
            backdrop-filter: blur(12px);
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(150px) rotate(360deg);
                opacity: 0;
            }
        }

        .animate-fall {
            animation: fall 1.5s ease-out forwards;
        }

        /* Background Glow Effect Styles */
        .crosshair-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 27 L30 33 M27 30 L33 30' stroke='rgba(255,100,255,0.1)' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
        }

        /* 3D Box Styling */
        .cube {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: translateZ(calc(var(--glow) * 40px));
            opacity: calc(var(--glow) * 1.5);
        }

        .face {
            position: absolute;
            box-sizing: border-box;
            border: 1.5px solid hsl(var(--hue), 80%, 65%);
        }

        .top {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: hsl(var(--hue), 90%, 60%);
            transform: translateZ(30px);
            box-shadow: 0 0 25px hsl(var(--hue), 80%, 50%);
        }

        .left {
            top: 100%;
            left: 0;
            width: 100%;
            height: 30px;
            background: hsl(var(--hue), 80%, 40%);
            transform-origin: top;
            transform: rotateX(-90deg);
        }

        .right {
            top: 0;
            left: 100%;
            width: 30px;
            height: 100%;
            background: hsl(var(--hue), 80%, 25%);
            transform-origin: left;
            transform: rotateY(90deg);
        }
    </style>
</head>

<body class="bg-backgroundDark text-slate-100 min-h-screen flex flex-col">

    <!-- Background Glow Elements (position: fixed so it lays behind everything) -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="crosshair-bg absolute inset-0"></div>
        <div class="absolute"
            style="top: 55%; left: 65%; transform: translate(-50%, -50%); width: 1000px; height: 1000px; perspective: 2500px;">
            <div id="grid"
                style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg); display: grid; grid-template-columns: repeat(22, 45px); grid-auto-rows: 45px; gap: 15px; transform-style: preserve-3d;">
                <!-- JS injects cubes here -->
            </div>
        </div>
    </div>

    <!-- HEADER (Added relative z-50 to ensure it stays on top) -->
    <header class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <div
                    class="size-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white">
                    <span class="material-symbols-outlined text-[20px]">cloud_upload</span>
                </div>
                <span class="text-xl font-bold">ImgUL</span>
            </div>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-white/10">
                <span class="material-symbols-outlined">dark_mode</span>
            </button>
        </div>
    </header>

    <main class="relative z-10 pt-24 pb-10 px-6 max-w-6xl mx-auto flex flex-col gap-8 pointer-events-none">
        <!-- Content must re-enable pointer events so buttons work while letting background grab mouse -->
        <div class="pointer-events-auto contents">

            <!-- HERO -->
            <div class="text-center">
                <h1
                    class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-white/60">
                    Image Hosting <span class="text-primary">Simplified</span>
                </h1>
                <p class="text-slate-400 text-base mt-2">
                    Drag, drop and deliver instantly.
                </p>
            </div>

            <!-- DROP AREA -->
            <div class="relative group max-w-3xl mx-auto w-full">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-primary to-secondary rounded-xl blur opacity-30">
                </div>

                <div id="dropArea"
                    class="relative bg-surface/80 backdrop-blur-sm border border-white/10 rounded-xl p-8 text-center flex flex-col items-center gap-4 cursor-pointer">

                    <input type="file" id="fileUpload" multiple class="hidden">

                    <div
                        class="size-16 rounded-xl bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center">
                        <span class="material-symbols-outlined text-3xl text-primary">cloud_upload</span>
                    </div>

                    <h3 class="text-xl font-bold">Drop or Paste images to upload</h3>
                    <p class="text-slate-400 text-sm">or click to browse (Max 10MB)</p>
                </div>
            </div>

            <!-- FILE QUEUE -->
            <div id="fileList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-4xl mx-auto"></div>

            <!-- BUTTON ROW -->
            <div class="flex justify-center gap-4 flex-wrap mt-2">
                <button id="uploadBtn"
                    class="hidden bg-gradient-to-r from-primary to-secondary hover:opacity-90 text-white px-8 py-3 rounded-lg font-semibold transition">
                    Upload Files
                </button>

                <button id="clearAllBtn"
                    class="px-5 py-2 bg-primary/20 hover:bg-primary/40 rounded-lg border border-primary/30 text-sm">
                    Clear All
                </button>

                <button id="copyAllBtn"
                    class="px-5 py-2 bg-secondary/20 hover:bg-secondary/40 rounded-lg border border-secondary/30 text-sm">
                    Copy All Links
                </button>
            </div>

            <!-- UPLOADED -->
            <div id="uploadedFiles" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-4xl mx-auto"></div>

        </div>
    </main>

    <script>
        // --- GLOW EFFECT LOGIC ---
        const gridElement = document.getElementById("grid");
        const cols = 22;
        const rows = 22;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const cube = document.createElement("div");
                cube.className = "cube";
                cube.innerHTML = `
            <div class="face top"></div>
            <div class="face left"></div>
            <div class="face right"></div>
        `;
                const hue = 180 + ((col + row) / (cols + rows)) * 110;
                cube.style.setProperty('--hue', hue);
                cube.style.setProperty('--glow', 0);
                gridElement.appendChild(cube);
            }
        }

        let cubesData = [];
        const mapCubes = () => {
            const domCubes = document.querySelectorAll(".cube");
            cubesData = Array.from(domCubes).map((cube) => {
                const rect = cube.getBoundingClientRect();
                return {
                    el: cube,
                    cx: rect.left + rect.width / 2,
                    cy: rect.top + rect.height / 2,
                    currentGlow: 0,
                    lastGlow: 0
                };
            });
        };

        setTimeout(mapCubes, 100);
        window.addEventListener("resize", () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(mapCubes, 200);
        });

        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        let hasMoved = false;

        window.addEventListener('mousemove', (e) => {
            hasMoved = true;
            cursorX = e.clientX;
            cursorY = e.clientY;
        });

        const animate = () => {
            if (cubesData.length > 0) {
                if (!hasMoved) {
                    const time = Date.now() * 0.001;
                    cursorX = window.innerWidth / 2 + Math.cos(time) * 150;
                    cursorY = window.innerHeight / 2 + Math.sin(time) * 150;
                }

                cubesData.forEach(cube => {
                    const dx = cursorX - cube.cx;
                    const dy = cursorY - cube.cy;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    const radius = 350;
                    let targetGlow = 1 - (distance / radius);
                    if (targetGlow < 0) targetGlow = 0;

                    targetGlow = Math.pow(targetGlow, 1.8);
                    const diff = targetGlow - cube.currentGlow;
                    cube.currentGlow += diff * 0.15;

                    let glowVal = Math.round(cube.currentGlow * 100) / 100;

                    if (glowVal < 0.01 && targetGlow === 0) {
                        glowVal = 0;
                        cube.currentGlow = 0;
                    }

                    if (cube.lastGlow !== glowVal) {
                        cube.el.style.setProperty('--glow', glowVal);
                        cube.lastGlow = glowVal;
                    }
                });
            }
            requestAnimationFrame(animate);
        };
        animate();

        // --- ORIGINAL IMGUL LOGIC ---
        const fileInput = document.getElementById("fileUpload");
        const fileList = document.getElementById("fileList");
        const uploadBtn = document.getElementById("uploadBtn");
        const dropArea = document.getElementById("dropArea");
        const uploadedFilesDiv = document.getElementById("uploadedFiles");
        const clearAllBtn = document.getElementById("clearAllBtn");
        const copyAllBtn = document.getElementById("copyAllBtn");
        const themeToggle = document.getElementById("themeToggle");

        const MAX_SIZE = 10 * 1024 * 1024;
        const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
        const WEBSITE_URL = "/i/";
        let selectedFiles = [];

        themeToggle.onclick = () => {
            document.documentElement.classList.toggle("dark");
        };

        function updateFileList() {
            fileList.innerHTML = "";

            selectedFiles.forEach((file, index) => {
                const div = document.createElement("div");
                div.className = "bg-surface/80 backdrop-blur-md border border-white/10 rounded-lg p-4 relative z-20";

                div.innerHTML = `
      <img src="${URL.createObjectURL(file)}" class="w-full h-32 object-cover rounded mb-3"/>
      <p class="text-sm truncate">${file.name}</p>
      <div class="w-full bg-slate-700 h-2 mt-2 rounded">
        <div id="progress-${index}" class="h-2 bg-primary rounded" style="width:0%"></div>
      </div>
      <button class="text-red-400 text-xs mt-2 relative z-20">Remove</button>
    `;

                div.querySelector("button").onclick = () => {
                    selectedFiles.splice(index, 1);
                    updateFileList();
                };

                fileList.appendChild(div);
            });

            uploadBtn.classList.toggle("hidden", selectedFiles.length === 0);
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!ALLOWED_TYPES.includes(file.type)) {
                    alert(file.name + " invalid type");
                    return;
                }
                if (file.size > MAX_SIZE) {
                    alert(file.name + " exceeds 10MB");
                    return;
                }
                selectedFiles.push(file);
            });

            updateFileList();
        }

        fileInput.addEventListener("change", e => handleFiles(e.target.files));
        dropArea.addEventListener("click", () => fileInput.click());
        dropArea.addEventListener("dragover", e => e.preventDefault());
        dropArea.addEventListener("drop", e => {
            e.preventDefault();
            handleFiles(e.dataTransfer.files);
        });

        clearAllBtn.onclick = () => {
            uploadedFilesDiv.innerHTML = "";
            selectedFiles = [];
            fileList.innerHTML = "";
            uploadBtn.classList.add("hidden");
            fileInput.value = "";
        };

        copyAllBtn.onclick = () => {
            const links = Array.from(uploadedFilesDiv.querySelectorAll("a"))
                .map(a => a.href)
                .join("\n");

            if (!links) {
                alert("No uploaded files.");
                return;
            }

            navigator.clipboard.writeText(links)
                .then(() => alert("All links copied!"))
                .catch(() => alert("Clipboard failed."));
        };

        uploadBtn.addEventListener("click", () => {
            if (!selectedFiles.length) return;

            uploadBtn.innerText = "Uploading...";
            uploadBtn.disabled = true;

            const formData = new FormData();
            selectedFiles.forEach(f => formData.append("files[]", f));

            const xhr = new XMLHttpRequest();
            xhr.open("POST", "/upload");

            xhr.upload.onprogress = e => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    selectedFiles.forEach((_, index) => {
                        const bar = document.getElementById(`progress-${index}`);
                        if (bar) bar.style.width = percent + "%";
                    });
                }
            };

            xhr.onerror = () => {
                alert("Upload failed. Please try again.");
                resetUploadState();
            };

            xhr.onload = () => {
                if (xhr.status < 200 || xhr.status >= 300) {
                    alert("Server error: " + xhr.status);
                    resetUploadState();
                    return;
                }

                let result;
                try {
                    result = JSON.parse(xhr.responseText);
                } catch {
                    alert("Invalid server response");
                    resetUploadState();
                    return;
                }

                if (!result || !Array.isArray(result.files)) {
                    alert("Unexpected server format");
                    resetUploadState();
                    return;
                }

                const uploadedLinks = [];

                result.files.forEach(fileData => {
                    if (fileData.status === "success" && fileData.url) {
                        const fullURL = window.location.origin + WEBSITE_URL + fileData.url;
                        uploadedLinks.push(fullURL);

                        const card = document.createElement("div");
                        card.className = "bg-surface border border-white/10 rounded-lg p-4 relative z-20";

                        card.innerHTML = `
          <img src="${WEBSITE_URL + fileData.url}" class="w-full h-32 object-cover rounded mb-3"/>
          <p class="text-sm truncate mb-1">${fileData.file}</p>
          <a href="${fullURL}" target="_blank" class="text-primary text-sm underline block mb-2">View</a>
          <button class="bg-primary text-white px-3 py-1 rounded text-xs relative z-20">Copy</button>
        `;

                        card.querySelector("button").onclick = () => {
                            navigator.clipboard.writeText(fullURL)
                                .then(() => alert("Link copied!"))
                                .catch(() => alert("Clipboard failed."));
                        };

                        uploadedFilesDiv.appendChild(card);
                    }
                });

                if (uploadedLinks.length) {
                    navigator.clipboard.writeText(uploadedLinks.join("\n"))
                        .catch(() => { });
                }

                selectedFiles = [];
                fileList.innerHTML = "";
                fileInput.value = "";
                resetUploadState();
            };

            xhr.send(formData);
        });

        function resetUploadState() {
            uploadBtn.innerText = "Upload Files";
            uploadBtn.disabled = false;
        }

        document.addEventListener("paste", (event) => {
            const items = event.clipboardData?.items;
            if (!items) return;

            for (const item of items) {
                if (item.type.startsWith("image/")) {
                    const file = item.getAsFile();
                    if (!file) return;

                    event.preventDefault();
                    handleFiles([file]);
                    uploadBtn.click();
                    break;
                }
            }
        });
    </script>

</body>

</html>
